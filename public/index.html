<!DOCTYPE html>  
<html lang="es">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>INCA RAIL ESAB</title>  
  <link rel="stylesheet" href="style.css">  
  <link href="https://fonts.googleapis.com/css2?family=Baskervville&display=swap" rel="stylesheet">  
</head>  
<body>  
  <!-- Animación Llama al inicio -->  
  <div id="llama-loader">  
    <div class="llama"></div>  
  </div>  
  
  <div id="app" class="hidden">  
    <h1>INCA RAIL ESAB</h1>  
    <div class="fondo-machu"></div>  
  
    <div class="menu-principal">  
      <button id="btn-calicanto">CALICANTO</button>  
      <button id="btn-andenes">ANDENES</button>  
      <button id="btn-reportes">REPORTES DE HAB</button>  
    </div>  
  
    <!-- Cuadro aislado para uso futuro - Bloc de notas -->  
    <div id="bloc-notas">  
      <h3>BLOC DE NOTAS</h3>  
      <textarea placeholder="Escribe aquí... código aislado"></textarea>  
    </div>  
    <div class="version-box">1°</div>  
  </div>  
  
  <!-- Modal: Lista de Habitaciones -->  
  <div id="modal-habs" class="modal hidden">  
    <div class="modal-content">  
      <span class="close">&times;</span>  
      <h2 id="modal-titulo"></h2>  
      <div id="lista-habs"></div>  
    </div>  
  </div>  
  
  <!-- Modal: Vista de Cuarto 2D + Formulario -->  
  <div id="modal-cuarto" class="modal hidden">  
    <div class="modal-content grande">  
      <span class="close">&times;</span>  
      <div id="vista-2d"></div>  
      <form id="form-reserva" class="hidden">  
        <input type="text" id="nombre" placeholder="NOMBRE COMPLETO" required>  
        <select id="sexo" required>  
          <option value="">SEXO</option>  
          <option value="M">MASCULINO</option>  
          <option value="F">FEMENINO</option>  
        </select>  
        <input type="text" id="dni" placeholder="DNI" required>  
        <input type="number" id="dias" placeholder="DIAS" required>  
        <button type="submit">GUARDAR</button>  
      </form>  
    </div>  
  </div>  
  
  <!-- Modal: Reportes -->  
  <div id="modal-reportes" class="modal hidden">  
    <div class="modal-content reportes">  
      <span class="close">&times;</span>  
      <h2>REPORTES</h2>  
      <div id="pass-container">  
        <input type="password" id="pass-reportes" placeholder="Contraseña">  
        <button id="btn-pass">Entrar</button>  
      </div>  
      <div id="reportes-content" class="hidden">  
        <div class="reportes-col" id="reportes-izq"></div>  
        <div class="reportes-col" id="reportes-der"></div>  
      </div>  
    </div>  
  </div>  
  
  <script src="script.js"></script>  
</body>  
</html>
